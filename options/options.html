<!-- options/options.html -->
<!DOCTYPE html>
<html>
<head>
  <title>YouTube Transcript Extractor Options</title>
  <style>
    body {
      width: 400px;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #fff;
    }
    
    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #FF0000;
    }
    
    .option {
      margin-bottom: 20px;
    }
    
    .option-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #FF0000;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    
    input {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      background: #000;
      color: #fff;
      border: 1px solid #444;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background: #FF0000;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 5px;
    }
    
    button:hover {
      background: #cc0000;
    }
    
    .model-section {
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      background: #1a1a1a;
    }
  </style>
</head>
<body>
  <h1>YouTube Transcript Extractor Settings</h1>
  
  <div class="model-section">
    <div class="option-title">Gemini Settings</div>
    <div class="option">
      <label for="gemini-api-key">Gemini API Key</label>
      <input type="text" id="gemini-api-key" placeholder="Enter your Gemini API Key">
      <button id="save-gemini-key">Save Gemini Key</button>
    </div>
  </div>
  
  <div class="model-section">
    <div class="option-title">Mistral Settings</div>
    <div class="option">
      <label for="mistral-api-key">Mistral API Key</label>
      <input type="text" id="mistral-api-key" placeholder="Enter your Mistral API Key">
      <button id="save-mistral-key">Save Mistral Key</button>
    </div>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
