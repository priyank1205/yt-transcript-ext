<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Transcript Extractor Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      background: #09090b;
      color: #fafafa;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255, 0, 0, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 28px 24px 20px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .header-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, #ff0000 0%, #cc0000 100%);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 24px rgba(255, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
      animation: iconFloat 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes iconFloat {
      from { opacity: 0; transform: scale(0.8) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .header-icon svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #fafafa;
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
    }

    .header p {
      font-size: 13px;
      color: #71717a;
      margin-top: 4px;
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.15s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Model Cards */
    .model-card {
      background: #18181b;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
      animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .model-card:nth-child(1) { animation-delay: 0.15s; }
    .model-card:nth-child(2) { animation-delay: 0.25s; }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .model-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .model-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
    }

    /* Card Header */
    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .model-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .model-icon.gemini {
      background: linear-gradient(135deg, #1a73e8 0%, #4285f4 100%);
      box-shadow: 0 2px 12px rgba(66, 133, 244, 0.2);
    }

    .model-icon.mistral {
      background: #fff;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .model-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .model-icon.mistral svg {
      width: 20px;
      height: 18px;
    }

    .model-info {
      flex: 1;
    }

    .model-name {
      font-size: 14px;
      font-weight: 600;
      color: #fafafa;
      letter-spacing: -0.01em;
    }

    .model-desc {
      font-size: 12px;
      color: #52525b;
      margin-top: 1px;
    }

    .status-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.02em;
      transition: all 0.3s ease;
    }

    .status-badge.configured {
      background: rgba(34, 197, 94, 0.1);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .status-badge.not-configured {
      background: rgba(113, 113, 122, 0.1);
      color: #71717a;
      border: 1px solid rgba(113, 113, 122, 0.2);
    }

    .status-badge.invalid {
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    /* Input Group */
    .input-group {
      position: relative;
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #a1a1aa;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper input {
      width: 100%;
      padding: 10px 40px 10px 12px;
      background: #09090b;
      color: #fafafa;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      letter-spacing: 0.03em;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .input-wrapper input::placeholder {
      color: #3f3f46;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      letter-spacing: 0;
    }

    .input-wrapper input:focus {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
    }

    .input-wrapper input.secured {
      letter-spacing: 0.15em;
    }

    .toggle-visibility {
      position: absolute;
      right: 8px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #52525b;
      transition: color 0.2s ease, background 0.2s ease;
      padding: 0;
    }

    .toggle-visibility:hover {
      color: #a1a1aa;
      background: rgba(255, 255, 255, 0.05);
    }

    .toggle-visibility svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Save Button */
    .save-btn {
      width: 100%;
      padding: 9px 16px;
      background: rgba(255, 255, 255, 0.06);
      color: #d4d4d8;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .save-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.12);
      color: #fafafa;
    }

    .save-btn:active {
      transform: scale(0.99);
    }

    .save-btn.saving {
      background: rgba(34, 197, 94, 0.1);
      border-color: rgba(34, 197, 94, 0.3);
      color: #4ade80;
      pointer-events: none;
    }

    .save-btn .btn-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: opacity 0.2s ease;
    }

    .save-btn .btn-content svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding-top: 8px;
      animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
    }

    .footer p {
      font-size: 11px;
      color: #3f3f46;
      letter-spacing: 0.02em;
    }

    .footer a {
      color: #52525b;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .footer a:hover {
      color: #a1a1aa;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #27272a;
      color: #fafafa;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast svg {
      width: 14px;
      height: 14px;
      fill: #4ade80;
    }
  </style>
</head>
